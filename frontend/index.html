<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notebook — Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="desk">
  <div class="notebook" id="notebook">

    <!-- ring binder spine with punch holes -->
    <div class="spine" aria-hidden="true">
      <div class="rings"></div>
    </div>

    <!-- page tabs (section switcher) -->
    <div class="tabs" id="tabs">
      <button class="tab tab-org active" data-section="organizations">
        <span>Organizations</span>
      </button>
      <button class="tab tab-users" data-section="users">
        <span>Users</span>
      </button>
      <button class="tab tab-teams" data-section="teams">
        <span>Teams</span>
      </button>
      <button class="tab tab-cal" data-section="calendar">
        <span>Calendar</span>
      </button>
    </div>

    <div class="page">
      <header class="page-head">
        <h1 class="scrawl" id="pageTitle">Organizations</h1>
        <div class="head-tools">
          <div class="api-status" id="apiStatus" title="Backend connection status">
            <span class="dot"></span><span class="txt">checking…</span>
          </div>
          <button class="lamp-toggle" id="themeToggle" title="Toggle lights">
            <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="5"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></g></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
          </button>
        </div>
      </header>

      <!-- ORGANIZATIONS -->
      <section class="sheet active" id="sec-organizations">
        <form class="ruled-form" id="orgForm">
          <input type="text" name="name" placeholder="Organization name" required />
          <input type="text" name="description" placeholder="What do they do?" />
          <input type="color" name="color" value="#5b7fdb" title="Tab color" />
          <button type="submit" class="btn-ink">+ Add org</button>
        </form>
        <div class="card-grid" id="orgList"></div>
      </section>

      <!-- USERS -->
      <section class="sheet" id="sec-users">
        <form class="ruled-form" id="userForm">
          <input type="text" name="name" placeholder="Full name" required />
          <input type="email" name="email" placeholder="email@company.com" required />
          <input type="text" name="role" placeholder="Role (e.g. Engineer)" />
          <select name="organization_id" required></select>
          <button type="submit" class="btn-ink">+ Add user</button>
        </form>
        <div class="filter-row">
          <label class="scrawl-sm">Filter by org:</label>
          <select id="userOrgFilter"><option value="">All organizations</option></select>
        </div>
        <div class="card-grid" id="userList"></div>
      </section>

      <!-- TEAMS -->
      <section class="sheet" id="sec-teams">
        <form class="ruled-form" id="teamForm">
          <input type="text" name="name" placeholder="Team name" required />
          <input type="text" name="description" placeholder="What's the team for?" />
          <input type="color" name="color" value="#2f8f5b" title="Tab color" />
          <button type="submit" class="btn-ink">+ Add team</button>
        </form>
        <p class="hint">Teams can mix people from different organizations — pick members below after creating a team.</p>
        <div class="card-grid" id="teamList"></div>
      </section>

      <!-- CALENDAR -->
      <section class="sheet" id="sec-calendar">
        <div class="cal-toolbar">
          <button class="btn-flat" id="calPrev">&larr;</button>
          <h2 class="scrawl" id="calLabel"></h2>
          <button class="btn-flat" id="calNext">&rarr;</button>
          <button class="btn-flat" id="calToday">Today</button>
          <div class="cal-filters">
            <select id="calOrgFilter"><option value="">All orgs</option></select>
            <select id="calTeamFilter"><option value="">All teams</option></select>
          </div>
          <button class="btn-ink" id="newEventBtn">+ New event</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </section>

    </div>
  </div>
</div>

<!-- Team member picker modal -->
<div class="modal-backdrop" id="teamModalBackdrop">
  <div class="modal sheet-modal">
    <h3 class="scrawl" id="teamModalTitle">Team members</h3>
    <div id="teamModalMembers" class="chip-list"></div>
    <div class="add-member-row">
      <select id="teamModalUserSelect"></select>
      <button class="btn-ink" id="teamModalAddBtn">Add member</button>
    </div>
    <button class="btn-flat modal-close" data-close>Close</button>
  </div>
</div>

<!-- Event modal -->
<div class="modal-backdrop" id="eventModalBackdrop">
  <div class="modal sheet-modal">
    <h3 class="scrawl" id="eventModalTitle">New event</h3>
    <form id="eventForm" class="ruled-form stacked">
      <input type="hidden" name="id" />
      <input type="text" name="title" placeholder="Event title" required />
      <textarea name="description" placeholder="Details…" rows="2"></textarea>
      <input type="text" name="location" placeholder="Location" />
      <div class="two-col">
        <label>Start <input type="datetime-local" name="start_time" required /></label>
        <label>End <input type="datetime-local" name="end_time" required /></label>
      </div>
      <div class="two-col">
        <label>Organization
          <select name="organization_id"><option value="">— none —</option></select>
        </label>
        <label>Team
          <select name="team_id"><option value="">— none —</option></select>
        </label>
      </div>
      <label>Attendees
        <select name="attendee_ids" multiple size="4"></select>
      </label>
      <label>Color <input type="color" name="color" value="#2c4870" /></label>
      <div class="modal-actions">
        <button type="button" class="btn-flat danger" id="deleteEventBtn" style="display:none">Delete</button>
        <button type="button" class="btn-flat" data-close>Cancel</button>
        <button type="submit" class="btn-ink">Save event</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>window.API_BASE = "https://calendar-app-2aef.onrender.com";</script>
<script src="app.js"></script>
</body>
</html>
